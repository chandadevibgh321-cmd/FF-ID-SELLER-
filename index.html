<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART STUDY - छात्र टेस्ट</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .login-card, .tests-card, .exam-card {
            max-width: 950px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; margin-bottom: 25px; color: #1a1a2e; font-weight: 700; }
        .smart-logo { text-align: center; margin-bottom: 20px; }
        .smart-logo i { font-size: 50px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .smart-logo h1 { font-size: 28px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        input {
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.3); }
        .timer {
            text-align: center;
            font-size: 38px;
            font-weight: 800;
            color: #e74c3c;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 60px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 50px;
            height: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            width: 0%;
            height: 100%;
            transition: width 0.4s;
        }
        .question-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }
        .option {
            padding: 14px 20px;
            margin: 10px 0;
            background: white;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: 0.2s;
            font-weight: 500;
        }
        .option:hover { border-color: #667eea; transform: translateX(8px); }
        .option.selected { background: linear-gradient(90deg, #667eea, #764ba2); color: white; border-color: transparent; }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }
        .nav-buttons button { width: auto; padding: 12px 30px; background: #0f3460; }
        .submit-btn { background: linear-gradient(90deg, #27ae60, #2ecc71); margin-top: 20px; }
        .error { color: #e74c3c; text-align: center; margin-top: 15px; font-weight: 500; }
        .test-item {
            background: white;
            padding: 25px;
            margin: 18px 0;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #e0e0e0;
            position: relative;
            overflow: hidden;
        }
        .test-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .test-item:hover { transform: translateX(8px); border-color: #667eea; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .test-name { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        .test-meta { display: flex; gap: 20px; margin-top: 10px; color: #666; font-size: 14px; }
        .test-meta i { margin-right: 5px; }
        .available-badge { display: inline-block; background: #27ae60; color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px; margin-top: 12px; }
        .disabled-message { text-align: center; padding: 60px; background: white; border-radius: 25px; margin: 50px auto; max-width: 500px; }
        .logout-btn { background: #e74c3c; margin-top: 20px; }
        .q-counter { background: #667eea; color: white; padding: 8px 18px; border-radius: 40px; font-weight: 600; }
        @media (max-width: 768px) {
            .login-card, .tests-card, .exam-card { padding: 25px; margin: 30px 15px; }
            .timer { font-size: 28px; }
            .test-name { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="loginPage">
        <div class="login-card">
            <div class="smart-logo"><i class="fas fa-graduation-cap"></i><h1>SMART STUDY</h1></div>
            <h2><i class="fas fa-sign-in-alt"></i> छात्र लॉगिन</h2>
            <input type="text" id="rollNo" placeholder="📛 अपना रोल नंबर दर्ज करें">
            <button onclick="userLogin()"><i class="fas fa-arrow-right"></i> लॉगिन करें</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="testsPage" style="display:none;">
        <div class="tests-card">
            <div class="smart-logo"><i class="fas fa-graduation-cap"></i><h1>SMART STUDY</h1></div>
            <h2><i class="fas fa-list"></i> उपलब्ध टेस्ट</h2>
            <div id="testsList"></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> लॉगआउट</button>
        </div>
    </div>

    <div id="examPage" style="display:none;">
        <div class="exam-card">
            <div class="smart-logo"><i class="fas fa-graduation-cap"></i><h1>SMART STUDY</h1></div>
            <h2 id="testName"></h2>
            <div class="timer" id="timer">⏱️ 90:00</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="questionContainer"></div>
            <div class="nav-buttons">
                <button onclick="prevQuestion()"><i class="fas fa-chevron-left"></i> पिछला</button>
                <span class="q-counter" id="qCounter">प्रश्न 1 / 0</span>
                <button onclick="nextQuestion()">अगला <i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="submit-btn" onclick="submitExam()"><i class="fas fa-check-circle"></i> टेस्ट सबमिट करें</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBxkEXfCDbvOCPKPIjCbSS3V2M6QOIKUY",
            authDomain: "zone-battel.firebaseapp.com",
            databaseURL: "https://zone-battel-default-rtdb.firebaseio.com",
            projectId: "zone-battel",
            storageBucket: "zone-battel.firebasestorage.app",
            messagingSenderId: "534047646078",
            appId: "1:534047646078:web:31d5ace3a74109fc76d32f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentQ = 0, userAnswers = [], questions = [], studentData = null, timerInterval = null, timeLeft = 90 * 60;
        let currentTestId = null, currentTestName = null;

        async function userLogin() {
            let rollNo = document.getElementById('rollNo').value.trim();
            if(!rollNo) { document.getElementById('loginError').innerText = 'रोल नंबर दर्ज करें'; return; }
            
            const studentSnap = await db.ref('students').orderByChild('rollNo').equalTo(rollNo).once('value');
            if(studentSnap.empty) { document.getElementById('loginError').innerText = '❌ रोल नंबर पंजीकृत नहीं'; return; }
            
            studentSnap.forEach(s => { studentData = { key: s.key, ...s.val() }; });
            if(studentData.isBlocked) { document.getElementById('loginError').innerText = '🔴 आप ब्लॉक हैं'; return; }
            
            if(!studentData.completedTests) studentData.completedTests = {};
            
            await loadAvailableTests();
        }

        async function loadAvailableTests() {
            const testsSnap = await db.ref('tests').once('value');
            let html = '';
            let hasTest = false;
            
            console.log("Loading tests...");
            
            testsSnap.forEach(test => {
                const t = test.val();
                console.log("Test:", t.id, "isPublic:", t.isPublic, "completed:", studentData.completedTests[t.id]);
                
                // सिर्फ वही टेस्ट दिखाएँ जो:
                // 1. पब्लिक है (isPublic === true)
                // 2. छात्र ने पहले नहीं दिया है (completedTests में नहीं है)
                if(t.isPublic === true && !studentData.completedTests[t.id]) {
                    hasTest = true;
                    const qCount = t.questions ? Object.keys(t.questions).length : 0;
                    html += `<div class="test-item" onclick="startTest('${test.key}', '${t.name}', ${t.timeMinutes || 90})">
                        <div class="test-name">📋 ${t.name}</div>
                        <div class="test-meta">
                            <span><i class="fas fa-question-circle"></i> ${qCount} प्रश्न</span>
                            <span><i class="fas fa-clock"></i> ${t.timeMinutes || 90} मिनट</span>
                        </div>
                        <div class="available-badge">✅ उपलब्ध - क्लिक करें</div>
                    </div>`;
                }
            });
            
            if(!hasTest) {
                html = '<div class="disabled-message"><i class="fas fa-check-circle" style="font-size:60px;color:#27ae60"></i><h2 style="margin-top:15px;">कोई टेस्ट उपलब्ध नहीं है</h2><p>जब एडमिन टेस्ट पब्लिक करेगा तो यहाँ दिखेगा</p></div>';
            }
            
            document.getElementById('testsList').innerHTML = html;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('testsPage').style.display = 'block';
        }

        async function startTest(testId, testName, testTime) {
            currentTestId = testId;
            currentTestName = testName;
            
            const testSnap = await db.ref(`tests/${testId}`).once('value');
            const test = testSnap.val();
            
            if(!test.isPublic) {
                alert('यह टेस्ट अब उपलब्ध नहीं है');
                loadAvailableTests();
                return;
            }
            
            questions = [];
            if(test.questions) {
                Object.keys(test.questions).forEach(key => {
                    questions.push(test.questions[key]);
                });
                questions.sort((a,b) => a.id - b.id);
            }
            
            userAnswers = new Array(questions.length).fill(null);
            timeLeft = (test.timeMinutes || 90) * 60;
            document.getElementById('testName').innerHTML = `<i class="fas fa-file-alt"></i> ${testName}`;
            document.getElementById('testsPage').style.display = 'none';
            document.getElementById('examPage').style.display = 'block';
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    submitExam(); 
                } else {
                    timeLeft--;
                    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    document.getElementById('timer').innerHTML = `⏱️ ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        function renderQuestion() {
            if(!questions.length) return;
            let q = questions[currentQ];
            let html = `<div class="question-box"><div class="question-text">${currentQ+1}. ${q.text}</div>`;
            q.options.forEach(opt => {
                let isSelected = (userAnswers[currentQ] === opt);
                html += `<div class="option ${isSelected ? 'selected' : ''}" onclick="selectAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</div>`;
            });
            html += `</div>`;
            document.getElementById('questionContainer').innerHTML = html;
            document.getElementById('qCounter').innerHTML = `प्रश्न ${currentQ+1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = ((currentQ+1)/questions.length)*100 + '%';
        }

        function selectAnswer(ans) { userAnswers[currentQ] = ans; renderQuestion(); }
        function nextQuestion() { if(currentQ < questions.length-1) { currentQ++; renderQuestion(); } else alert('📢 आप अंतिम प्रश्न पर हैं'); }
        function prevQuestion() { if(currentQ > 0) { currentQ--; renderQuestion(); } }

        async function submitExam() {
            if(confirm('⚠️ क्या आप सुनिश्चित हैं? टेस्ट सबमिट करने के बाद बदलाव नहीं कर सकते।')) {
                clearInterval(timerInterval);
                
                let score = 0;
                let correctAnswers = [];
                let questionTexts = [];
                for(let i = 0; i < questions.length; i++) {
                    correctAnswers.push(questions[i].correct);
                    questionTexts.push(questions[i].text);
                    if(userAnswers[i] === questions[i].correct) score++;
                }
                
                await db.ref('results').push({
                    rollNo: studentData.rollNo,
                    name: studentData.name,
                    testId: currentTestId,
                    score: score,
                    total: questions.length,
                    answers: userAnswers,
                    correctAnswers: correctAnswers,
                    questions: questionTexts,
                    submittedAt: new Date().toISOString()
                });
                
                await db.ref(`students/${studentData.key}/completedTests/${currentTestId}`).set(true);
                
                alert(`✅ टेस्ट सबमिट हो गया!\n🎯 आपका स्कोर: ${score}/${questions.length} (${((score/questions.length)*100).toFixed(1)}%)`);
                location.reload();
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
